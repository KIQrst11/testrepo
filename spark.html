<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,sans-serif;
min-height:100vh;
background:
radial-gradient(circle at top,#162235,#06090f);

color:white;
overflow-x:hidden;
display:flex;
justify-content:center;
padding:40px 20px;

}

.container{

width:100%;
max-width:600px;

}

.card{

background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:30px;

padding:35px;

box-shadow:
0 25px 80px rgba(0,0,0,.5);

animation:fade .7s ease;

}

.logo{

width:80px;
height:80px;

margin:auto;

border-radius:50%;

background:
linear-gradient(135deg,#00c6ff,#00ffcc);

display:flex;
align-items:center;
justify-content:center;

font-size:30px;
font-weight:bold;

margin-bottom:25px;
color:#000;

}

.hero{

text-align:center;
margin-bottom:25px;

}

.hero h1{

font-size:34px;
margin-bottom:10px;

}

.hero span{

color:#00ffcc;

}

.hero p{

opacity:.8;
line-height:1.6;

}

.badges{

display:flex;
gap:12px;
margin:25px 0;
flex-wrap:wrap;

}

.badge{

flex:1;

background:rgba(0,255,170,.08);

border:
1px solid rgba(0,255,170,.25);

padding:12px;

border-radius:14px;

font-size:13px;

text-align:center;

}

.info{

background:
rgba(255,255,255,.04);

padding:25px;

border-radius:18px;

line-height:1.8;

margin-top:20px;
margin-bottom:30px;

}

.install{

display:block;
width:100%;

text-align:center;

padding:18px;

border-radius:16px;

text-decoration:none;

font-weight:bold;
font-size:18px;

color:black;

background:
linear-gradient(135deg,#00c6ff,#00ffcc);

transition:.3s;

}

.install:hover{

transform:translateY(-3px);

}

.footer{

text-align:center;
margin-top:18px;
font-size:13px;
opacity:.6;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:none;

}

}

</style>

✓ Android APK
</div>

</div>

<div class="info">

2. “Noma’lum manbaga ruxsat berish” ni yoqing

<br>

3. O‘rnatilish tugashini kuting

<br>

4. SPARK ilovasini oching

</div>
